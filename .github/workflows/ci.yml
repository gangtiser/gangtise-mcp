name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # --ignore-scripts: no dependency here needs install-time lifecycle scripts,
      # and skipping them keeps a poisoned transitive dep from executing in CI.
      - run: npm ci --ignore-scripts
      # Runs against the official registry (local npmmirror config can't audit).
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run build
      - run: npm test
